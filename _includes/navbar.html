<style>
  #site-nav {
    background-color: rgba(255,255,255,0.62);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(14,27,52,0.05);
    transition: background-color 250ms ease, box-shadow 250ms ease, border-color 250ms ease;
  }
  #site-nav.is-scrolled {
    background-color: rgba(255,255,255,0.82);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-color: rgba(14,27,52,0.08);
    box-shadow: 0 6px 24px -18px rgba(14,27,52,0.18);
  }
  /* Fallback para navegadores sin backdrop-filter (Firefox antiguo, etc.) */
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    #site-nav            { background-color: rgba(255,255,255,0.95); }
    #site-nav.is-scrolled{ background-color: #ffffff; }
  }
  .nav-link {
    position: relative;
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--color-ink-700);
    padding: 0.5rem 0;
    transition: color 200ms ease;
  }
  .nav-link:hover { color: var(--color-ink-900); }
  .nav-link.is-active { color: var(--color-brand-blue); }
  .nav-link.is-active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -2px;
    height: 2px;
    border-radius: 999px;
    background-color: var(--color-brand-blue);
  }
  #mobile-menu {
    transition: max-height 350ms ease, opacity 250ms ease;
    max-height: 0; opacity: 0; overflow: hidden;
  }
  #mobile-menu.open { max-height: 700px; opacity: 1; }
</style>

<nav id="site-nav" class="fixed top-0 inset-x-0 z-50" aria-label="Navegación principal">
  <div class="container-prose flex items-center justify-between gap-6 py-3.5">

    <a href="/" class="flex items-center gap-2.5" aria-label="Ir a la página principal de {{ site.title }}">
      <img src="/assets/img/logo.png" class="h-9 w-9 object-contain" alt="" />
      <span class="text-[15px] font-semibold tracking-tight text-ink-900">
        Fundación <span class="text-brand-blue">Sonriente</span>
      </span>
    </a>

    <ul class="hidden lg:flex items-center gap-8">
      <li><a href="/nosotros"            class="nav-link {% if page.url contains 'nosotros' %}is-active{% endif %}">Nosotros</a></li>
      <li><a href="/actividades"         class="nav-link {% if page.url contains 'actividades' %}is-active{% endif %}">Programas</a></li>
      <li><a href="/galeria"             class="nav-link {% if page.url contains 'galeria' %}is-active{% endif %}">Galería</a></li>
      <li><a href="/voluntariado"        class="nav-link {% if page.url contains 'voluntariado' %}is-active{% endif %}">Voluntariado</a></li>
      <li><a href="/estados-financieros" class="nav-link {% if page.url contains 'estados-financieros' %}is-active{% endif %}">Transparencia</a></li>
      <li><a href="/contactanos"         class="nav-link {% if page.url contains 'contactanos' %}is-active{% endif %}">Contacto</a></li>
    </ul>

    <div class="flex items-center gap-2">

      <a href="/donaciones" class="hidden sm:inline-flex btn btn-accent py-2.5 px-5 text-sm">
        Donar ahora
        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6 6 6-6 6"/>
        </svg>
      </a>

      <button id="menu-toggle" type="button"
              class="lg:hidden inline-flex h-10 w-10 items-center justify-center rounded-full text-ink-700 hover:bg-ink-50"
              aria-controls="mobile-menu" aria-expanded="false" aria-label="Abrir menú">
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="mobile-menu" class="lg:hidden border-t border-ink-100 bg-white/95" style="backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);">
    <div class="container-prose py-4 flex flex-col gap-1">
      <a href="/nosotros"            class="py-3 nav-link {% if page.url contains 'nosotros' %}is-active{% endif %}">Nosotros</a>
      <a href="/actividades"         class="py-3 nav-link {% if page.url contains 'actividades' %}is-active{% endif %}">Programas</a>
      <a href="/galeria"             class="py-3 nav-link {% if page.url contains 'galeria' %}is-active{% endif %}">Galería</a>
      <a href="/voluntariado"        class="py-3 nav-link {% if page.url contains 'voluntariado' %}is-active{% endif %}">Voluntariado</a>
      <a href="/estados-financieros" class="py-3 nav-link {% if page.url contains 'estados-financieros' %}is-active{% endif %}">Transparencia</a>
      <a href="/contactanos"         class="py-3 nav-link {% if page.url contains 'contactanos' %}is-active{% endif %}">Contacto</a>
      <a href="/donaciones" class="btn btn-accent mt-3 w-full">Donar ahora</a>
    </div>
  </div>
</nav>

<script>
  (function () {
    const menuBtn = document.getElementById('menu-toggle');
    const menu = document.getElementById('mobile-menu');
    if (!menuBtn || !menu) return;
    menuBtn.addEventListener('click', () => {
      const isOpen = menu.classList.toggle('open');
      menuBtn.setAttribute('aria-expanded', String(isOpen));
      menuBtn.setAttribute('aria-label', isOpen ? 'Cerrar menú' : 'Abrir menú');
    });
    menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      menu.classList.remove('open');
      menuBtn.setAttribute('aria-expanded', 'false');
    }));
  })();
</script>
