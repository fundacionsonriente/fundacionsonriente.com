  <!-- Script del botón -->
  <script>
    (function () {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;

      const apply = (mode) => {
        const isDark = mode === 'dark';
        document.documentElement.classList.toggle('dark', isDark);
        btn.setAttribute('aria-pressed', String(isDark));
        try { localStorage.setItem('theme', mode); } catch (_) {}
      };

      // Estado inicial del botón según clase actual
      btn.setAttribute('aria-pressed', String(document.documentElement.classList.contains('dark')));

      btn.addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark');
        apply(isDark ? 'light' : 'dark');
      });

      // Si no hay preferencia guardada, sincroniza con el sistema
      try {
        const ls = localStorage.getItem('theme');
        if (!ls) {
          const mql = window.matchMedia('(prefers-color-scheme: dark)');
          mql.addEventListener?.('change', (e) => apply(e.matches ? 'dark' : 'light'));
        }
      } catch (_) {}
    })();
  </script>
